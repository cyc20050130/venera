name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          architecture: x64
          cache: true
      - name: Resolve dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-pub
      - name: Check dependency boundaries
        run: flutter test --no-pub test/architecture_dependency_test.dart

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          architecture: x64
          cache: true
      - name: Resolve dependencies
        run: flutter pub get
      - name: Build native test runtimes
        run: flutter build windows --release --no-pub
      - name: Run tests
        run: flutter test --no-pub --reporter=compact -j 1
